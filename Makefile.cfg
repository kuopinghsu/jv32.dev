# JV32 SoC Core Configuration
# Edit this file to change default hardware and simulation parameters.
# All settings use ?= so they can be overridden on the make command line:
#   make FAST_MUL=0 rtl-hello
#   make IRAM_SIZE=65536 DRAM_SIZE=65536 compare-all

# =============================================================================
# ISA / Feature configuration
# =============================================================================
# RV32EC: 1=minimum-area RV32EC preset (overrides individual flags below):
#         RV32E_EN=1, RV32M_EN=0, ZB_EN=0, JTAG_EN=0, TRACE_EN=0,
#         FAST_SHIFT=0, BP_EN=0, RAS_EN=0, AMO_EN=0
#         0=use individual settings below (default)
RV32EC              ?= 0

# When RV32EC=1, force all minimal-config flags regardless of individual settings.
ifeq ($(RV32EC),1)
  RV32E_EN          := 1
  RV32M_EN          := 0
  ZB_EN             := 0
  JTAG_EN           := 0
  TRACE_EN          := 0
  FAST_SHIFT        := 0
  BP_EN             := 0
  RAS_EN            := 0
  AMO_EN            := 0
else
  # RV32E_EN: 1=RV32E (16 GPRs), 0=RV32I (32 GPRs)
  RV32E_EN          ?= 0
  # RV32M_EN: 1=include M-extension (MUL/DIV), 0=illegal trap on MUL/DIV
  RV32M_EN          ?= 1
  # ZB_EN: 1=Zba/Zbb/Zbs bit-manipulation extensions, 0=synthesized away
  #        Automatically forced to 0 when RV32E_EN=1 (see jv32_core.sv ZB_ACTIVE).
  #        Note: ZB_EN only controls RTL hardware; the GCC ARCH string is NOT
  #        updated (jv32sim does not implement Zb ops; compare-* tests still work).
  ZB_EN             ?= 1
  # JTAG_EN: 1=include JTAG debug interface, 0=remove from synthesis
  JTAG_EN           ?= 1
  # TRACE_EN: 1=trace output registers present, 0=outputs tied to 0 (saves area)
  TRACE_EN          ?= 1
  # AMO_EN: 1=include A-extension (atomic ops), 0=illegal trap on AMO
  AMO_EN            ?= 1
endif

# =============================================================================
# Pipeline
# =============================================================================
# FAST_MUL: 1=combinatorial multiplier, 0=serial shift-and-add (variable latency)
FAST_MUL            ?= 1
# MUL_MC: 1=2-stage pipelined multiplier (2 cycles; better timing; requires FAST_MUL=1)
#         0=1-cycle combinatorial multiplier (requires FAST_MUL=1)
MUL_MC              ?= 1
# FAST_DIV: 1=combinatorial divider, 0=serial restoring divider (variable latency)
FAST_DIV            ?= 0
# FAST_SHIFT: 1=barrel shifter (1 cycle), 0=1-bit-per-cycle serial shifter
FAST_SHIFT          ?= 1

# =============================================================================
# Branch Predictor
# =============================================================================
# BP_EN: 1=enable branch predictor, 0=always-not-taken
BP_EN               ?= 1
# RAS_EN: 1=Return Address Stack enabled, 0=JALR always causes 1-cycle EX redirect
#         Auto-disabled when RV32EC=1 (minimum config)
RAS_EN              ?= 1

# =============================================================================
# Memory Map
# =============================================================================
# IRAM_SIZE: instruction SRAM size in bytes (power-of-2, max 512 KB)
IRAM_SIZE           ?= 131072
# DRAM_SIZE: data SRAM size in bytes (power-of-2, max 512 KB)
DRAM_SIZE           ?= 131072
# BOOT_ADDR: reset vector and IRAM base address
BOOT_ADDR           ?= 0x80000000
# IRAM_BASE: base address of instruction SRAM (normally == BOOT_ADDR)
IRAM_BASE           ?= 0x80000000
# DRAM_BASE: base address of data SRAM
DRAM_BASE           ?= 0xC0000000

# =============================================================================
# Simulation / Testbench
# =============================================================================
# CLK_FREQ: simulation clock frequency in Hz — single source of truth for both
# the SV testbench (CLK_FREQ parameter, e.g. UART baud calculation) and the
# C++ Verilator driver (CLK_FREQ_HZ → CLK_PERIOD_PS / CLK_HALF_PS).
CLK_FREQ            ?= 80000000
# TIMEOUT: wall-clock timeout in seconds (0=no limit).
# Increase when using serial mul/div/shift (FAST_*=0) — those configurations
# take significantly more cycles per operation and need more wall time.
TIMEOUT             ?= 120
# MAX_CYCLES: stop RTL simulation after this many cycles (0=no limit)
MAX_CYCLES          ?= 0
# MAX_INSNS: stop software simulator after this many instructions (0=no limit)
MAX_INSNS           ?= 0
# WAVE: waveform format — "" (none), "fst", "vcd"
WAVE                ?=
# TRACE: 1=print RTL instruction trace to stdout, ""=disabled
TRACE               ?=

# =============================================================================
# Debug Verbosity (RTL)
# =============================================================================
# DEBUG: 1=level-1 messages, 2=level-1+level-2 per-group messages, ""=off
DEBUG               ?=
# DEBUG_GROUP: bitmask of module groups to print (only used when DEBUG=2)
DEBUG_GROUP         ?=

# =============================================================================
# Toolchain
# =============================================================================
# RISCV_PREFIX: RISC-V GCC cross-compiler prefix
RISCV_PREFIX        ?= riscv64-unknown-elf-
# VERILATOR: path to Verilator binary
VERILATOR           ?= verilator
# VERILATOR_JOBS: parallel Verilator build jobs (0=auto)
VERILATOR_JOBS      ?= 0
# VERIBLE: path to verible-verilog-lint binary (None=skip lint)
VERIBLE             ?= None
# VERIBLE_FORMAT: path to verible-verilog-format binary (None=skip formatting)
VERIBLE_FORMAT      ?= None
# SVLINT: path to svlint binary (None=skip lint)
SVLINT              ?= None
# GTKWAVE: path to GTKWave binary
GTKWAVE             ?= gtkwave

