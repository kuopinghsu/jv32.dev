# ===================================================================
# prj.conf  --  Zephyr kernel config for stress unit tests
# ===================================================================

# --- Test framework ------------------------------------------------
CONFIG_ZTEST=y

# --- Threading -----------------------------------------------------
CONFIG_THREAD_NAME=y
CONFIG_NUM_PREEMPT_PRIORITIES=16
CONFIG_NUM_COOP_PRIORITIES=16

# --- Synchronisation primitives ------------------------------------
CONFIG_EVENTS=y

# --- Memory --------------------------------------------------------
# Heap for dynamic allocation (k_fifo internal metadata, etc.)
CONFIG_HEAP_MEM_POOL_SIZE=8192

# --- Scheduler -----------------------------------------------------
CONFIG_TIMESLICING=y
CONFIG_TIMESLICE_SIZE=1
CONFIG_TIMESLICE_PRIORITY=0

# --- Debug / tracing (optional, safe to enable in sim) -------------
CONFIG_THREAD_MONITOR=y
CONFIG_ASSERT=y
