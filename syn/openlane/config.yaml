# ============================================================================
# OpenLane 2 Design Configuration for jv32_soc
# Target PDK:  Nangate 45nm Open Cell Library (freepdk45)
# Target flow: Classic (Synthesis → Floorplan → Place → CTS → Route → Signoff)
# ============================================================================

# ── Design identification ─────────────────────────────────────────────────────
DESIGN_NAME: jv32_soc

# ── PDK selection ─────────────────────────────────────────────────────────────
# PDK_ROOT is set on the command line or via the PDK_ROOT env variable:
#   openlane --pdk-root syn/pdk --pdk freepdk45 openlane/config.yaml
PDK: freepdk45
STD_CELL_LIBRARY: NangateOpenCellLibrary

# ── RTL sources ───────────────────────────────────────────────────────────────
# OpenLane2 'dir::' prefix resolves paths relative to the DESIGN_DIR
# (= the directory containing this config.yaml = syn/openlane/).
# So ../../rtl/ → project rtl/, and ../lib/ → syn/lib/.
# The black-box wrapper (syn/lib/sram_1rw.sv) is included here so Yosys
# can emit a correct black-box reference for sram_1rw_32768x8 during synthesis.
VERILOG_FILES:
  - dir::../../rtl/jv32/core/jv32_pkg.sv
  - dir::../../rtl/jv32/core/jv32_rvc.sv
  - dir::../../rtl/jv32/core/jv32_decoder.sv
  - dir::../../rtl/jv32/core/jv32_alu.sv
  - dir::../../rtl/jv32/core/jv32_regfile.sv
  - dir::../../rtl/jv32/core/jv32_csr.sv
  - dir::../../rtl/jv32/core/jv32_core.sv
  - dir::../../rtl/jv32/core/jtag/cjtag_bridge.sv
  - dir::../../rtl/jv32/core/jtag/jv32_dtm.sv
  - dir::../../rtl/jv32/core/jtag/jtag_tap.sv
  - dir::../../rtl/jv32/core/jtag/jtag_top.sv
  - dir::../lib/sram_1rw.sv
  - dir::../../rtl/axi/axi_pkg.sv
  - dir::../../rtl/axi/axi_xbar.sv
  - dir::../../rtl/axi/axi_uart.sv
  - dir::../../rtl/axi/axi_clic.sv
  - dir::../../rtl/axi/axi_ram_ctrl.sv
  - dir::../../rtl/axi/axi_magic.sv
  - dir::../../rtl/jv32/jv32_top.sv
  - dir::../../rtl/jv32_soc.sv

# ── Timing ────────────────────────────────────────────────────────────────────
# 100 MHz target (10 ns period) for Nangate 45nm
CLOCK_PERIOD: 10.0
CLOCK_PORT: clk

# SDC files fed directly to OpenROAD for PnR (not used for synthesis)
PNR_SDC_FILE: dir::jv32_soc_pnr.sdc
SIGNOFF_SDC_FILE: dir::jv32_soc_pnr.sdc

# ── SRAM black-box macros ─────────────────────────────────────────────────────
# EXTRA_LEFS: LEF abstracts for the OpenRAM-generated SRAM macros.
# EXTRA_LIBS: Liberty timing models for the SRAM macros (TT/FF/SS corners).
# The paths below use the absolute output directory produced by 'make gen-mem'.
# Override on the command line if the build directory differs.
EXTRA_LEFS:
  - dir::../lib/openram/sram_1rw_2048x32.lef

EXTRA_LIBS:
  - dir::../lib/openram/sram_1rw_2048x32_TT_1p1V_25C.lib

# MACROS describes each unique SRAM macro so OpenROAD can load the hard-macro
# views. In the Classic flow, these 32 instances still need explicit placement
# coordinates; see `macro_placement.cfg` below.
MACROS:
  sram_1rw_2048x32:
    gds:
      - dir::../lib/openram/sram_1rw_2048x32.gds
    lef:
      - dir::../lib/openram/sram_1rw_2048x32.lef
    lib:
      "tt_025C_1v10":
        - dir::../lib/openram/sram_1rw_2048x32_TT_1p1V_25C.lib
      "ff_025C_1v10":
        - dir::../lib/openram/sram_1rw_2048x32_FF_1p0V_25C.lib
      "ss_025C_1v10":
        - dir::../lib/openram/sram_1rw_2048x32_SS_1p0V_25C.lib

# The Classic flow does not auto-place hard macros; provide fixed locations for
# all 32 SRAM banks so tap insertion and PDN generation can proceed.
MACRO_PLACEMENT_CFG: dir::macro_placement.cfg

# ── Synthesis ─────────────────────────────────────────────────────────────────
# Preprocessor defines for synthesis (disable simulation-only constructs)
VERILOG_DEFINES:
  - SYNTHESIS
  - NO_ASSERTION
  - GENERIC_SRAM

# SYNTH_PARAMETERS (IRAM_SIZE / DRAM_SIZE) are NOT defined here.
# The Makefile computes them from IRAM_BANKS * 8192 / DRAM_BANKS * 8192 and
# writes build/tcm_params.yaml, which is passed to OpenLane2 as a second config.

SYNTH_STRATEGY: AREA 0

# ── Linter settings ───────────────────────────────────────────────────────────
# Verilator in older versions cannot parse bit-slicing on function-call results
# (e.g. c_sext6(...)[11:0]), which is valid SV-2012.  Yosys handles it fine.
# Do not abort the flow on Verilator lint errors; synthesis can still proceed.
ERROR_ON_LINTER_ERRORS: false

# ── Synlig: full SystemVerilog front-end for Yosys ────────────────────────────
# Use Synlig (Surelog) instead of Yosys's native SV parser so that package
# wildcard imports (import jv32_pkg::*;) and other SV-2012 constructs work.
USE_SYNLIG: true

# ── Floorplan ─────────────────────────────────────────────────────────────────
# Die area in µm.  Sized to accommodate 32 × sram_1rw_2048x32 + logic.
# Adjust after reviewing macro dimensions from the OpenRAM LEF.
# Rough estimate: each 2048×32 SRAM ~0.04 mm²; 32 macros → ~1.3 mm² + logic.
FP_CORE_UTIL: 35
FP_ASPECT_RATIO: 1

# Power-delivery network
FP_PDN_VOFFSET: 10
FP_PDN_HOFFSET: 10
FP_PDN_VWIDTH: 3.1
FP_PDN_HWIDTH: 4.6
FP_PDN_VPITCH: 56
FP_PDN_HPITCH: 56

# ── Placement ─────────────────────────────────────────────────────────────────
PL_TARGET_DENSITY: 0.4
PL_MACRO_CHANNEL: [10, 10]

# Stage 36 hold repair can exceed the default hold-buffer budget on this
# macro-heavy design; raise the cap to prevent RSZ-0060 early termination.
PL_RESIZER_HOLD_MAX_BUFFER_PCT: 100

# ── CTS ───────────────────────────────────────────────────────────────────────
CLOCK_TREE_SYNTH: true

# ── Routing ───────────────────────────────────────────────────────────────────
# Global routing: increase layer count for large die
RT_MAX_LAYER: Metal9
GRT_ALLOW_CONGESTION: true

# ── Antenna diode insertion ───────────────────────────────────────────────────
RUN_ANTENNA_REPAIR: true

# ── Fill insertion ────────────────────────────────────────────────────────────
RUN_FILL_INSERTION: true
