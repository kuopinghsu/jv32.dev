# =============================================================================
# File   : jv32_fpga_jtag.cfg
# Project: JV32 RISC-V SoC – FPGA (XCKU5PFFVB676)
# Brief  : OpenOCD config – 4-wire JTAG via FT2232H probe
#
# Wiring  (FT2232H Channel A  →  XCKU5PFFVB676, LVCMOS33, HR bank)
# -------
#   ADBUS0  TCK  →  jtag_tck_i  D11
#   ADBUS1  TDI  →  jtag_tdi_i  J12
#   ADBUS2  TDO ←   jtag_tdo_o  E12
#   ADBUS3  TMS  →  jtag_tms_i  C12
#   GND     GND  →  FPGA GND
#
# Usage
# -----
#   openocd -f fpga/jtag/jv32_fpga_jtag.cfg
#   openocd -f fpga/jtag/jv32_fpga_jtag.cfg -c "init; halt"
# =============================================================================

# -----------------------------------------------------------------------------
# Adapter – FT2232H, MPSSE mode, Channel A
# -----------------------------------------------------------------------------
adapter driver ftdi

# Default FTDI VID/PID for FT2232H; replace if your board uses a custom PID.
ftdi vid_pid 0x0403 0x6010

ftdi channel 0                  ;# Channel A

# MPSSE initial pin state / direction
#   bit 3 (TMS)  – output, init 1  (idle-high per IEEE 1149.1)
#   bit 2 (TDO)  – input
#   bit 1 (TDI)  – output, init 0
#   bit 0 (TCK)  – output, init 0
#   layout_init  <value> <direction>
ftdi layout_init 0x0008 0x000b

transport select jtag

# TCK max is 10 MHz (constraints.xdc: 100 ns period on jtag_tck).
# Lower to 1000 if you see scan errors due to long cables / signal integrity.
adapter speed 10000

# nTRST is wired to 1'b1 (always deasserted) in jv32_fpga_top.sv; no SRST.
reset_config none

# -----------------------------------------------------------------------------
# JTAG TAP
# -----------------------------------------------------------------------------
set _CHIPNAME jv32

jtag newtap $_CHIPNAME cpu \
    -irlen 5 \
    -expected-id 0x1DEAD3FF

# -----------------------------------------------------------------------------
# RISC-V debug target
# -----------------------------------------------------------------------------
target create $_CHIPNAME.cpu riscv -chain-position $_CHIPNAME.cpu

riscv set_ir dtmcs 0x10
riscv set_ir dmi   0x11
riscv set_mem_access sysbus
riscv set_command_timeout_sec 10
