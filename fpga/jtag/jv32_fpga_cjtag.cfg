# =============================================================================
# File   : jv32_fpga_cjtag.cfg
# Project: JV32 RISC-V SoC – FPGA (XCKU5PFFVB676)
# Brief  : OpenOCD config – 2-wire cJTAG (IEEE 1149.7 OScan1) via FT2232H probe
#
# Hardware requirements
# ---------------------
#   This config requires a bitstream built with USE_CJTAG=1 in jv32_fpga_top.sv.
#   The default bitstream uses USE_CJTAG=0 (4-wire JTAG only).
#
#   The TMSC pin (C12) must be driven by a bidirectional IOBUF in the FPGA top:
#     IOBUF u_tmsc_buf (
#         .IO (jtag_tms_io),          // connect to FPGA pin C12
#         .I  (jtag_pin1_tms_o),      // from jv32_soc
#         .O  (jtag_pin1_tms_i),      // to   jv32_soc
#         .T  (jtag_pin1_tms_oe)      // output-enable (active-low tristate)
#     );
#
# Wiring  (FT2232H Channel A  →  XCKU5PFFVB676, LVCMOS33, HR bank)
# -------
#   ADBUS0  TCKC  →  jtag_tck_i  D11   (cJTAG clock, unidirectional)
#   ADBUS3  TMSC  ↔  jtag_tms_io C12   (cJTAG data, bidirectional)
#   GND     GND   →  FPGA GND
#   (ADBUS1 TDI and ADBUS2 TDO are unused in 2-wire cJTAG mode)
#
# Clock ratio (cjtag_bridge.sv requirement: f_sys >= 6 × f_tckc)
#   50 MHz sys ÷ 6 = 8.33 MHz max TCKC  →  use 5 MHz for margin
#
# Usage
# -----
#   openocd -f fpga/jtag/jv32_fpga_cjtag.cfg
#   openocd -f fpga/jtag/jv32_fpga_cjtag.cfg -c "init; halt"
# =============================================================================

# -----------------------------------------------------------------------------
# Adapter – FT2232H, MPSSE mode, Channel A
# -----------------------------------------------------------------------------
adapter driver ftdi

# Default FTDI VID/PID for FT2232H; replace if your board uses a custom PID.
ftdi vid_pid 0x0403 0x6010

ftdi channel 0                  ;# Channel A

# MPSSE initial pin state / direction:
#   bit 4 (JTAG_SEL) – output, init 0  (unused MPSSE pin, see note below)
#   bit 3 (TMSC)     – output, init 1  (TMSC idle-high)
#   bit 2            – input  (unused in cJTAG; was TDO)
#   bit 1            – output (unused in cJTAG; was TDI)
#   bit 0 (TCKC)     – output, init 0
ftdi layout_init 0x0008 0x001b

# OScan1 mode: OpenOCD multiplexes TDI, TDO, and TMS over the single TMSC line
# (ADBUS3).  The MPSSE direction is toggled per OScan1 frame to tristate TMSC
# during the TDO capture phase.
#
# OpenOCD's FTDI driver requires a JTAG_SEL layout signal to be declared when
# oscan1_mode is enabled (used to drive the cJTAG activation sequence).  The
# jv32 cjtag_bridge auto-detects OScan1 entry from TMSC/TCKC edges, so no
# physical JTAG_SEL pin is needed – we map it to an unused MPSSE pin (ADBUS4).
#
# TCK and TMS layout signals must also be declared so the driver can bit-bang
# the cJTAG online/activate escape sequences directly on TCKC (ADBUS0) and
# TMSC (ADBUS3) before MPSSE-mode JTAG scans begin.
ftdi layout_signal TCK      -data 0x0001
ftdi layout_signal TDI      -data 0x0002
ftdi layout_signal TDO      -input 0x0004
ftdi layout_signal TMS      -data 0x0008
ftdi layout_signal JTAG_SEL -data 0x0010
ftdi oscan1_mode on

transport select jtag

# TCKC max ≈ 8.3 MHz (50 MHz FPGA sys-clk ÷ 6, per cjtag_bridge.sv).
# Use 5 MHz for timing margin; lower to 1000 if activation is unreliable.
adapter speed 5000

# nTRST is wired to 1'b1 (always deasserted) in jv32_fpga_top.sv; no SRST.
reset_config none

# -----------------------------------------------------------------------------
# JTAG TAP
# (The cJTAG bridge presents a standard JTAG TAP to OpenOCD after activation.)
# -----------------------------------------------------------------------------
set _CHIPNAME jv32

jtag newtap $_CHIPNAME cpu \
    -irlen 5 \
    -expected-id 0x1DEAD3FF

# -----------------------------------------------------------------------------
# RISC-V debug target
# -----------------------------------------------------------------------------
target create $_CHIPNAME.cpu riscv -chain-position $_CHIPNAME.cpu

riscv set_ir dtmcs 0x10
riscv set_ir dmi   0x11
riscv set_mem_access sysbus
riscv set_command_timeout_sec 10
