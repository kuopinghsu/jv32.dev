# Source the common config from the same directory as this file, regardless of
# the working directory OpenOCD was launched from.
source [file join [file dirname [info script]] jv32.cfg]

gdb port 3333
telnet port disabled
tcl port disabled

# Bare-metal target: no flash to program; use hardware breakpoints by default.
gdb_flash_program disable
gdb_breakpoint_override hard
