adapter driver jtag_vpi
jtag_vpi set_port 5555
jtag_vpi enable_cjtag on
transport select jtag

adapter speed 1000
reset_config none

set _CHIPNAME jv32
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x1DEAD3FF

target create $_CHIPNAME.cpu riscv -chain-position $_CHIPNAME.cpu
riscv set_ir dtmcs 0x10
riscv set_ir dmi 0x11
riscv set_mem_access abstract
riscv set_command_timeout_sec 10
jtag_ntrst_delay 100
